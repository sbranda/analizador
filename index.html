<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lector de Resultados</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1C3D37">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Resultados">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F6F3EC;
    --card:#FFFFFF;
    --ink:#1E2B29;
    --ink-soft:#4A5652;
    --teal:#2C5F56;
    --teal-deep:#1C3D37;
    --flag:#AE4B36;
    --flag-soft:#F1DED8;
    --line:#DCD5C4;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .wrap{
    max-width:640px;
    margin:0 auto;
    padding:28px 20px 60px;
  }
  header{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    border-bottom:1px solid var(--line);
    padding-bottom:18px;
    margin-bottom:24px;
  }
  h1{
    font-family:'Source Serif 4',serif;
    font-weight:600;
    font-size:1.5rem;
    margin:0;
    color:var(--teal-deep);
    letter-spacing:-0.01em;
  }
  .tag{
    font-family:'IBM Plex Mono',monospace;
    font-size:0.68rem;
    color:var(--ink-soft);
    letter-spacing:0.06em;
    text-transform:uppercase;
  }

  .upload-zone{
    background:var(--card);
    border:1.5px dashed var(--line);
    border-radius:10px;
    padding:26px 20px;
    text-align:center;
    cursor:pointer;
    transition:border-color .15s ease, background .15s ease;
  }
  .upload-zone:hover, .upload-zone.drag{
    border-color:var(--teal);
    background:#FDFCF9;
  }
  .upload-zone input{display:none;}
  .upload-icon{
    font-family:'IBM Plex Mono',monospace;
    font-size:1.6rem;
    color:var(--teal);
    display:block;
    margin-bottom:8px;
  }
  .upload-label{
    font-size:0.92rem;
    color:var(--ink);
    font-weight:500;
  }
  .upload-hint{
    font-size:0.78rem;
    color:var(--ink-soft);
    margin-top:4px;
  }
  .file-chip{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:10px;
    padding:12px 16px;
    margin-top:14px;
    font-size:0.88rem;
  }
  .file-chip button{
    background:none;
    border:none;
    color:var(--flag);
    font-family:'IBM Plex Mono',monospace;
    font-size:0.78rem;
    cursor:pointer;
    padding:0;
  }

  .section-label{
    font-family:'IBM Plex Mono',monospace;
    font-size:0.7rem;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--ink-soft);
    margin:26px 0 10px;
  }

  .modes{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }
  .mode-btn{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:10px;
    padding:14px 14px;
    text-align:left;
    cursor:pointer;
    transition:border-color .15s ease, background .15s ease;
  }
  .mode-btn:hover{border-color:var(--teal);}
  .mode-btn.active{
    border-color:var(--teal);
    background:var(--teal);
  }
  .mode-btn.active .mode-title, .mode-btn.active .mode-desc{color:#F6F3EC;}
  .mode-title{
    font-weight:600;
    font-size:0.9rem;
    display:block;
    margin-bottom:3px;
  }
  .mode-desc{
    font-size:0.76rem;
    color:var(--ink-soft);
    line-height:1.3;
  }

  .run-btn{
    width:100%;
    margin-top:22px;
    background:var(--teal-deep);
    color:#F6F3EC;
    border:none;
    border-radius:10px;
    padding:15px;
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:0.95rem;
    cursor:pointer;
    transition:background .15s ease;
  }
  .run-btn:disabled{
    background:#B9B2A0;
    cursor:not-allowed;
  }
  .run-btn:not(:disabled):hover{background:var(--teal);}

  .result{
    margin-top:28px;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:10px;
    padding:0;
    overflow:hidden;
  }
  .result-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:14px 18px;
    border-bottom:1px solid var(--line);
    background:#FBFAF6;
  }
  .result-head span{
    font-family:'IBM Plex Mono',monospace;
    font-size:0.7rem;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--teal-deep);
  }
  .result-body{
    display:flex;
  }
  .margin-rule{
    width:26px;
    flex-shrink:0;
    border-right:1px solid var(--line);
    position:relative;
  }
  .result-text{
    padding:18px 20px;
    font-size:0.92rem;
    line-height:1.65;
    white-space:pre-wrap;
  }
  .result-text b, .result-text strong{color:var(--teal-deep);}
  .flag-line{
    background:var(--flag-soft);
    border-left:3px solid var(--flag);
    padding:2px 8px;
    margin:2px -8px;
    border-radius:0 4px 4px 0;
    display:inline-block;
  }

  .disclaimer{
    margin-top:16px;
    font-size:0.76rem;
    color:var(--ink-soft);
    line-height:1.5;
    border-top:1px solid var(--line);
    padding-top:14px;
  }

  .loading{
    display:flex;
    align-items:center;
    gap:10px;
    padding:20px;
    font-size:0.88rem;
    color:var(--ink-soft);
  }
  .dot{
    width:6px;height:6px;border-radius:50%;
    background:var(--teal);
    animation:pulse 1.1s infinite ease-in-out;
  }
  .dot:nth-child(2){animation-delay:.15s;}
  .dot:nth-child(3){animation-delay:.3s;}
  @keyframes pulse{
    0%,80%,100%{opacity:.25;}
    40%{opacity:1;}
  }

  .error-box{
    margin-top:20px;
    background:var(--flag-soft);
    border:1px solid var(--flag);
    color:var(--flag);
    border-radius:10px;
    padding:14px 16px;
    font-size:0.85rem;
  }

  @media (prefers-reduced-motion: reduce){
    .dot{animation:none;}
  }

  .install-btn{
    width:100%;
    background:var(--card);
    border:1px solid var(--teal);
    color:var(--teal-deep);
    border-radius:10px;
    padding:12px;
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:0.88rem;
    cursor:pointer;
    margin-bottom:20px;
    transition:background .15s ease;
  }
  .install-btn:hover{background:#EEF3F1;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Lector de Documentos</h1>
    <span class="tag" id="headerTag">Lab · Rx</span>
  </header>

  <button id="installBtn" class="install-btn" style="display:none;">⬇ Instalar app</button>

  <div id="uploadZone" class="upload-zone">
    <input type="file" id="fileInput" accept=".pdf,.jpg,.jpeg,.png,.webp">
    <span class="upload-icon">⌁</span>
    <div class="upload-label">Sube tu documento (PDF o foto)</div>
    <div class="upload-hint">Toca aquí o arrastra el archivo</div>
  </div>
  <div id="fileChipHolder"></div>

  <div class="section-label">Tipo de documento</div>
  <div class="modes" id="categoryToggle">
    <button class="mode-btn active" data-cat="medico">
      <span class="mode-title">Análisis médico</span>
      <span class="mode-desc">Laboratorio, resultados clínicos</span>
    </button>
    <button class="mode-btn" data-cat="judicial">
      <span class="mode-title">Folio judicial</span>
      <span class="mode-desc">Expedientes, resoluciones, causas</span>
    </button>
  </div>

  <div class="section-label">¿Qué necesitas?</div>
  <div class="modes" id="modesMedico">
    <button class="mode-btn active" data-mode="resumen">
      <span class="mode-title">Resumen general</span>
      <span class="mode-desc">Panorama claro y breve de todo el documento</span>
    </button>
    <button class="mode-btn" data-mode="explica">
      <span class="mode-title">Explica cada valor</span>
      <span class="mode-desc">Qué mide cada prueba, en lenguaje simple</span>
    </button>
    <button class="mode-btn" data-mode="fuera_rango">
      <span class="mode-title">Fuera de rango</span>
      <span class="mode-desc">Solo lo que está alto, bajo o anormal</span>
    </button>
    <button class="mode-btn" data-mode="preguntas">
      <span class="mode-title">Preguntas al médico</span>
      <span class="mode-desc">Lista para llevar a tu próxima consulta</span>
    </button>
  </div>

  <div class="modes" id="modesJudicial" style="display:none;">
    <button class="mode-btn active" data-mode="resumen_folio">
      <span class="mode-title">Resumen del folio</span>
      <span class="mode-desc">Qué es el caso y en qué estado está, en breve</span>
    </button>
    <button class="mode-btn" data-mode="partes_roles">
      <span class="mode-title">Partes involucradas</span>
      <span class="mode-desc">Quién es quién: demandante, demandado, jueza, etc.</span>
    </button>
    <button class="mode-btn" data-mode="fechas_plazos">
      <span class="mode-title">Fechas y plazos</span>
      <span class="mode-desc">Fechas clave y plazos que no debes perder</span>
    </button>
    <button class="mode-btn" data-mode="proximos_pasos">
      <span class="mode-title">Próximos pasos</span>
      <span class="mode-desc">Qué sigue y qué acción se espera de ti</span>
    </button>
  </div>

  <button class="run-btn" id="runBtn" disabled>Sube un archivo primero</button>

  <div id="resultHolder"></div>
</div>

<script>
// 👉 Reemplaza esto por tu clave gratuita de Google AI Studio (aistudio.google.com/apikey)
// Restríngela por "referente HTTP" a tu dominio de GitHub Pages para mayor seguridad.
const GEMINI_API_KEY = 'AQ.Ab8RN6JuC1c84DAZpefaDF-IaGNtcmLBaGtuuEr7MMSoouMMTQ';
const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent`;

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(() => {});
  });
}

let deferredInstallPrompt = null;
const installBtn = document.getElementById('installBtn');
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  installBtn.style.display = 'block';
});
installBtn.addEventListener('click', async () => {
  if (!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  await deferredInstallPrompt.userChoice;
  deferredInstallPrompt = null;
  installBtn.style.display = 'none';
});
window.addEventListener('appinstalled', () => {
  installBtn.style.display = 'none';
});

const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');
const fileChipHolder = document.getElementById('fileChipHolder');
const runBtn = document.getElementById('runBtn');
const resultHolder = document.getElementById('resultHolder');
const categoryToggle = document.getElementById('categoryToggle');
const modesMedico = document.getElementById('modesMedico');
const modesJudicial = document.getElementById('modesJudicial');
const headerTag = document.getElementById('headerTag');

let currentFile = null; // {base64, mediaType, name}
let currentCategory = 'medico';
let currentMode = 'resumen';

const modePrompts = {
  medico: {
    resumen: `Da un resumen general y breve de este documento de análisis médico/laboratorio, en español sencillo, para una persona sin formación médica. Organiza el resumen en 3-5 puntos clave. No des diagnóstico, solo explica qué muestra el documento.`,
    explica: `Explica en español sencillo qué mide cada prueba o valor incluido en este análisis de laboratorio, uno por uno, en 1-2 frases cada uno. Usa un formato de lista. No des diagnóstico.`,
    fuera_rango: `Identifica ÚNICAMENTE los valores que están fuera del rango de referencia (altos o bajos) en este análisis. Para cada uno, indica: el nombre del valor, el resultado, el rango normal, y una explicación breve y sencilla de qué podría significar en general (sin diagnosticar). Marca cada valor fuera de rango empezando la línea con "⚑ ". Si todo está normal, dilo claramente.`,
    preguntas: `Basándote en este análisis de laboratorio, genera una lista de 5-8 preguntas concretas y útiles que la persona podría llevar a su médico en la próxima consulta, en español, para entender mejor sus resultados y próximos pasos.`
  },
  judicial: {
    resumen_folio: `Este documento es un folio o expediente judicial. Da un resumen general y breve en español sencillo, para alguien sin formación legal: de qué trata el caso, en qué materia (civil, penal, laboral, etc.) y en qué etapa procesal se encuentra actualmente. Organiza en 3-5 puntos clave. No des asesoría legal, solo explica qué muestra el documento.`,
    partes_roles: `Identifica a todas las partes y personas mencionadas en este folio judicial: demandante, demandado, jueza/juez, fiscal, abogados, testigos, u otros roles relevantes. Para cada una, indica su nombre y su rol en el caso, en formato de lista, en español sencillo.`,
    fechas_plazos: `Extrae ÚNICAMENTE las fechas y plazos importantes mencionados en este folio judicial: audiencias, notificaciones, vencimientos de plazos para responder o apelar, y cualquier fecha límite. Para cada una indica la fecha, qué evento es, y por qué importa. Marca los plazos que estén próximos a vencer o sean urgentes empezando la línea con "⚑ ". Usa formato de lista.`,
    proximos_pasos: `Basándote en el estado actual de este folio judicial, genera una lista de 4-7 próximos pasos concretos: qué acciones se esperan de la persona, qué documentos podría necesitar preparar, y qué preguntas debería hacerle a su abogado. En español sencillo. No es asesoría legal, son sugerencias generales de organización.`
  }
};

const modeLabels = {
  medico: {
    resumen: 'Resumen general',
    explica: 'Explicación de valores',
    fuera_rango: 'Valores fuera de rango',
    preguntas: 'Preguntas para el médico'
  },
  judicial: {
    resumen_folio: 'Resumen del folio',
    partes_roles: 'Partes involucradas',
    fechas_plazos: 'Fechas y plazos',
    proximos_pasos: 'Próximos pasos'
  }
};

const disclaimers = {
  medico: 'Esto no es un diagnóstico médico. Para interpretar tus resultados con certeza y decidir próximos pasos, consulta siempre con tu médico.',
  judicial: 'Esto no es asesoría legal. Para decisiones sobre tu caso, consulta siempre con tu abogado o representante legal.'
};

categoryToggle.addEventListener('click', e => {
  const btn = e.target.closest('.mode-btn');
  if (!btn) return;
  document.querySelectorAll('#categoryToggle .mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentCategory = btn.dataset.cat;

  if (currentCategory === 'medico') {
    modesMedico.style.display = 'grid';
    modesJudicial.style.display = 'none';
    currentMode = 'resumen';
    headerTag.textContent = 'Lab · Rx';
  } else {
    modesMedico.style.display = 'none';
    modesJudicial.style.display = 'grid';
    currentMode = 'resumen_folio';
    headerTag.textContent = 'Legal · Folio';
  }
  document.querySelectorAll('.modes .mode-btn[data-mode]').forEach(b => b.classList.remove('active'));
  document.querySelector(`#modes${currentCategory === 'medico' ? 'Medico' : 'Judicial'} .mode-btn`).classList.add('active');
  resultHolder.innerHTML = '';
});

uploadZone.addEventListener('click', () => fileInput.click());
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('drag');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => {
  if (e.target.files.length) handleFile(e.target.files[0]);
});

function handleFile(file){
  const reader = new FileReader();
  reader.onload = () => {
    const base64 = reader.result.split(',')[1];
    const ext = file.name.split('.').pop().toLowerCase();
    let mediaType = 'application/pdf';
    if (['jpg','jpeg'].includes(ext)) mediaType = 'image/jpeg';
    else if (ext === 'png') mediaType = 'image/png';
    else if (ext === 'webp') mediaType = 'image/webp';

    currentFile = { base64, mediaType, name: file.name };
    renderChip();
    runBtn.disabled = false;
    runBtn.textContent = 'Analizar documento';
  };
  reader.onerror = () => {
    fileChipHolder.innerHTML = `<div class="error-box">No se pudo leer el archivo. Intenta de nuevo.</div>`;
  };
  reader.readAsDataURL(file);
}

function renderChip(){
  fileChipHolder.innerHTML = `
    <div class="file-chip">
      <span>📄 ${currentFile.name}</span>
      <button id="removeFile">Quitar</button>
    </div>`;
  document.getElementById('removeFile').addEventListener('click', () => {
    currentFile = null;
    fileChipHolder.innerHTML = '';
    fileInput.value = '';
    runBtn.disabled = true;
    runBtn.textContent = 'Sube un archivo primero';
    resultHolder.innerHTML = '';
  });
}

[modesMedico, modesJudicial].forEach(container => {
  container.addEventListener('click', e => {
    const btn = e.target.closest('.mode-btn');
    if (!btn) return;
    container.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMode = btn.dataset.mode;
  });
});

runBtn.addEventListener('click', async () => {
  if (!currentFile) return;
  runBtn.disabled = true;
  const originalText = runBtn.textContent;
  runBtn.textContent = 'Analizando…';
  resultHolder.innerHTML = `
    <div class="result">
      <div class="loading">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        <span>Leyendo el documento…</span>
      </div>
    </div>`;

  try {
    const response = await fetch(GEMINI_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-goog-api-key': GEMINI_API_KEY,
      },
      body: JSON.stringify({
        contents: [{
          parts: [
            { inlineData: { mimeType: currentFile.mediaType, data: currentFile.base64 } },
            { text: modePrompts[currentCategory][currentMode] }
          ]
        }]
      })
    });

    if (!response.ok) {
      const errBody = await response.text();
      throw new Error('Error de la API (' + response.status + '): ' + errBody.slice(0, 200));
    }
    const data = await response.json();
    const text = (data.candidates?.[0]?.content?.parts || []).map(p => p.text || '').join('\n').trim();

    if (!text) throw new Error('No se pudo generar una respuesta.');

    renderResult(text);
  } catch (err) {
    resultHolder.innerHTML = `<div class="error-box">Ocurrió un problema al analizar el documento. ${err.message || ''} Intenta de nuevo.</div>`;
  } finally {
    runBtn.disabled = false;
    runBtn.textContent = originalText;
  }
});

function escapeHtml(str){
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderResult(text){
  const lines = text.split('\n').map(line => {
    let escaped = escapeHtml(line);
    escaped = escaped.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    if (escaped.trim().startsWith('⚑')) {
      return `<div class="flag-line">${escaped}</div>`;
    }
    return escaped;
  }).join('\n');

  resultHolder.innerHTML = `
    <div class="result">
      <div class="result-head"><span>${modeLabels[currentCategory][currentMode]}</span></div>
      <div class="result-body">
        <div class="margin-rule"></div>
        <div class="result-text">${lines}</div>
      </div>
    </div>
    <div class="disclaimer">${disclaimers[currentCategory]}</div>
  `;
}
</script>
</body>
</html>
