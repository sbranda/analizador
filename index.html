<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lector de Resultados</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1C3D37">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Resultados">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=Lexend:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F6F3EC;
    --card:#FFFFFF;
    --ink:#1E2B29;
    --ink-soft:#4A5652;
    --teal:#2C5F56;
    --teal-deep:#1C3D37;
    --flag:#AE4B36;
    --flag-soft:#F1DED8;
    --line:#DCD5C4;
    --accent:#FF6B4A;
    --accent-text:#FFFFFF;
    --shadow:#1C3D37;
    --radius:18px;
    --font-display:'Source Serif 4',serif;
    --font-body:'Inter',sans-serif;
    --font-mono:'IBM Plex Mono',monospace;
    --font-scale:1;
  }
  html{
    font-size:calc(16px * var(--font-scale));
  }
  body.theme-dark{
    --paper:#12191A;
    --card:#1B2422;
    --ink:#EDEAE2;
    --ink-soft:#B7C0BC;
    --teal:#5FBBA9;
    --teal-deep:#8ED4C4;
    --flag:#E38868;
    --flag-soft:#3A241D;
    --line:#33403C;
    --accent:#FF8A65;
    --shadow:#5FBBA9;
  }
  body.theme-sepia{
    --paper:#F3E9D7;
    --card:#FBF3E4;
    --ink:#4A3728;
    --ink-soft:#7A6650;
    --teal:#8C6A3F;
    --teal-deep:#5C4326;
    --flag:#B0503B;
    --flag-soft:#E8D2BC;
    --line:#DFCBA9;
    --accent:#B0503B;
    --shadow:#5C4326;
  }
  body.theme-contrast{
    --paper:#000000;
    --card:#000000;
    --ink:#FFFFFF;
    --ink-soft:#F2F2F2;
    --teal:#FFD400;
    --teal-deep:#FFFFFF;
    --flag:#FF8A65;
    --flag-soft:#3A1F1F;
    --line:#FFFFFF;
    --accent:#FFD400;
    --accent-text:#000000;
    --shadow:#FFD400;
  }
  body.theme-contrast .mode-btn,
  body.theme-contrast .upload-zone,
  body.theme-contrast .file-chip,
  body.theme-contrast .result,
  body.theme-contrast .install-btn{
    border-width:2px;
  }
  body.theme-contrast .mode-btn.active{
    background:var(--teal);
    color:#000;
  }
  body.theme-contrast .mode-btn.active .mode-title,
  body.theme-contrast .mode-btn.active .mode-desc{color:#000;}
  body.theme-contrast .run-btn{color:#000;}
  body.theme-contrast .a11y-btn[aria-pressed="true"]{color:#000;}
  body.theme-contrast .result-head span{color:#000;}
  body.theme-contrast header{
    border-color:#000;
  }
  body.theme-dark .run-btn,
  body.theme-sepia .run-btn{color:var(--paper);}

  body.dyslexia-font{
    --font-display:'Lexend',sans-serif;
    --font-body:'Lexend',sans-serif;
    --font-mono:'Lexend',sans-serif;
  }
  body.dyslexia-font .result-text{letter-spacing:0.01em; line-height:1.8;}

  :focus-visible{
    outline:3px solid var(--teal);
    outline-offset:2px;
  }
  body.theme-contrast :focus-visible{
    outline-color:#FFD400;
  }

  .skip-link{
    position:absolute;
    left:-999px;
    top:auto;
    background:var(--teal-deep);
    color:#fff;
    padding:10px 16px;
    border-radius:0 0 8px 0;
    z-index:1000;
  }
  .skip-link:focus{
    left:0;
    top:0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:var(--font-body);
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .wrap{
    max-width:640px;
    margin:0 auto;
    padding:28px 20px 60px;
  }
  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:var(--teal-deep);
    border:2px solid var(--ink);
    border-radius:var(--radius);
    padding:20px 22px;
    margin-bottom:26px;
    box-shadow:5px 5px 0 var(--shadow);
  }
  h1{
    font-family:var(--font-display);
    font-weight:700;
    font-size:1.9rem;
    margin:0;
    color:var(--paper);
    letter-spacing:-0.02em;
    line-height:1.05;
  }
  .tag{
    font-family:var(--font-mono);
    font-size:0.7rem;
    color:var(--accent-text);
    letter-spacing:0.08em;
    text-transform:uppercase;
    background:var(--accent);
    padding:4px 10px;
    border-radius:999px;
    border:1.5px solid var(--ink);
    font-weight:600;
  }

  .upload-zone{
    background:var(--card);
    border:2.5px dashed var(--ink);
    border-radius:var(--radius);
    padding:28px 20px;
    text-align:center;
    cursor:pointer;
    transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease;
    box-shadow:4px 4px 0 var(--shadow);
  }
  .upload-zone:hover, .upload-zone.drag{
    border-color:var(--accent);
    border-style:solid;
    transform:translate(-2px,-2px);
    box-shadow:6px 6px 0 var(--shadow);
  }
  .upload-zone input{display:none;}
  .upload-icon{
    font-family:var(--font-mono);
    font-size:2rem;
    color:var(--accent);
    display:block;
    margin-bottom:8px;
  }
  .upload-label{
    font-size:1rem;
    color:var(--ink);
    font-weight:700;
  }
  .upload-hint{
    font-size:0.8rem;
    color:var(--ink-soft);
    margin-top:4px;
  }
  .file-chip{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:var(--card);
    border:2px solid var(--ink);
    border-radius:12px;
    padding:12px 16px;
    margin-top:14px;
    font-size:0.88rem;
    font-weight:600;
  }
  .file-chip button{
    background:var(--accent);
    border:1.5px solid var(--ink);
    border-radius:8px;
    color:var(--accent-text);
    font-family:var(--font-mono);
    font-size:0.75rem;
    font-weight:700;
    cursor:pointer;
    padding:5px 10px;
  }

  .section-label{
    font-family:var(--font-mono);
    font-size:0.75rem;
    text-transform:uppercase;
    letter-spacing:0.1em;
    color:var(--ink);
    font-weight:700;
    margin:28px 0 12px;
  }

  .modes{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
  }
  .level-toggle{
    grid-template-columns:1fr 1fr 1fr;
  }
  .level-toggle .mode-btn{
    padding:10px 8px;
    text-align:center;
  }
  .level-toggle .mode-desc{
    font-size:0.68rem;
  }
  .mode-btn{
    background:var(--card);
    border:2px solid var(--ink);
    border-radius:14px;
    padding:14px 14px;
    text-align:left;
    cursor:pointer;
    transition:transform .1s ease, box-shadow .1s ease, background .1s ease;
    box-shadow:3px 3px 0 var(--shadow);
  }
  .mode-btn:hover{
    transform:translate(-1px,-1px);
    box-shadow:4px 4px 0 var(--shadow);
  }
  .mode-btn:active{
    transform:translate(2px,2px);
    box-shadow:1px 1px 0 var(--shadow);
  }
  .mode-btn.active{
    border-color:var(--ink);
    background:var(--accent);
    transform:translate(2px,2px);
    box-shadow:1px 1px 0 var(--shadow);
  }
  .mode-btn.active .mode-title, .mode-btn.active .mode-desc{color:var(--accent-text);}
  .mode-title{
    font-weight:700;
    font-size:0.94rem;
    display:block;
    margin-bottom:3px;
  }
  .mode-icon{
    font-size:1.3rem;
    display:block;
    margin-bottom:4px;
  }
  .mode-desc{
    font-size:0.78rem;
    color:var(--ink-soft);
    line-height:1.3;
  }

  .detect-status{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:0.85rem;
    font-weight:600;
    color:var(--ink-soft);
    margin-top:10px;
    min-height:0;
  }
  .detect-status.found{
    color:var(--teal-deep);
  }
  .detect-status .spinner{
    width:14px; height:14px;
    border:2px solid var(--line);
    border-top-color:var(--teal);
    border-radius:50%;
    animation:spin .7s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  @media (prefers-reduced-motion: reduce){
    .detect-status .spinner{animation:none;}
  }

  .run-btn{
    width:100%;
    margin-top:24px;
    background:var(--teal-deep);
    color:var(--paper);
    border:2px solid var(--ink);
    border-radius:14px;
    padding:16px;
    font-family:var(--font-body);
    font-weight:700;
    font-size:1rem;
    cursor:pointer;
    letter-spacing:0.01em;
    box-shadow:4px 4px 0 var(--shadow);
    transition:transform .1s ease, box-shadow .1s ease, background .1s ease;
  }
  .run-btn:disabled{
    background:#B9B2A0;
    color:#fff;
    cursor:not-allowed;
    box-shadow:none;
    border-color:#B9B2A0;
  }
  .run-btn:not(:disabled):hover{
    background:var(--teal);
    transform:translate(-1px,-1px);
    box-shadow:5px 5px 0 var(--shadow);
  }
  .run-btn:not(:disabled):active{
    transform:translate(3px,3px);
    box-shadow:1px 1px 0 var(--shadow);
  }

  .result{
    margin-top:28px;
    background:var(--card);
    border:2px solid var(--ink);
    border-radius:var(--radius);
    padding:0;
    overflow:hidden;
    box-shadow:5px 5px 0 var(--shadow);
  }
  .result-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:14px 18px;
    border-bottom:2px solid var(--ink);
    background:var(--accent);
  }
  .result-head span{
    font-family:var(--font-mono);
    font-size:0.72rem;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--accent-text);
    font-weight:700;
  }
  .result-body{
    display:flex;
  }
  .margin-rule{
    width:26px;
    flex-shrink:0;
    border-right:2px solid var(--line);
    position:relative;
  }
  .result-text{
    padding:18px 20px;
    font-size:0.94rem;
    line-height:1.65;
    white-space:pre-wrap;
  }
  .result-text b, .result-text strong{color:var(--teal-deep);}
  .flag-line{
    background:var(--flag-soft);
    border-left:4px solid var(--flag);
    padding:2px 8px;
    margin:2px -8px;
    border-radius:0 6px 6px 0;
    display:inline-block;
  }

  .disclaimer{
    margin-top:16px;
    font-size:0.76rem;
    color:var(--ink-soft);
    line-height:1.5;
    border-top:1px solid var(--line);
    padding-top:14px;
  }

  .loading{
    display:flex;
    align-items:center;
    gap:10px;
    padding:20px;
    font-size:0.88rem;
    color:var(--ink-soft);
  }
  .dot{
    width:6px;height:6px;border-radius:50%;
    background:var(--teal);
    animation:pulse 1.1s infinite ease-in-out;
  }
  .dot:nth-child(2){animation-delay:.15s;}
  .dot:nth-child(3){animation-delay:.3s;}
  @keyframes pulse{
    0%,80%,100%{opacity:.25;}
    40%{opacity:1;}
  }

  .error-box{
    margin-top:20px;
    background:var(--flag-soft);
    border:2px solid var(--flag);
    color:var(--flag);
    border-radius:14px;
    padding:14px 16px;
    font-size:0.85rem;
    font-weight:600;
    box-shadow:3px 3px 0 var(--shadow);
  }

  @media (prefers-reduced-motion: reduce){
    .dot{animation:none;}
  }

  .install-btn{
    width:100%;
    background:var(--accent);
    border:2px solid var(--ink);
    color:var(--accent-text);
    border-radius:14px;
    padding:13px;
    font-family:var(--font-body);
    font-weight:700;
    font-size:0.9rem;
    cursor:pointer;
    margin-bottom:20px;
    box-shadow:3px 3px 0 var(--shadow);
    transition:transform .1s ease, box-shadow .1s ease;
  }
  .install-btn:hover{transform:translate(-1px,-1px); box-shadow:4px 4px 0 var(--shadow);}
  .install-btn:active{transform:translate(2px,2px); box-shadow:1px 1px 0 var(--shadow);}

  .visually-hidden{
    position:absolute;
    width:1px;height:1px;
    padding:0;margin:-1px;
    overflow:hidden;
    clip:rect(0,0,0,0);
    white-space:nowrap;
    border:0;
  }

  .header-right{
    display:flex;
    align-items:center;
    gap:8px;
  }
  .a11y-toggle{
    background:var(--paper);
    border:2px solid var(--ink);
    border-radius:10px;
    padding:6px 10px;
    font-family:var(--font-body);
    font-size:0.78rem;
    font-weight:700;
    color:var(--ink);
    cursor:pointer;
    box-shadow:2px 2px 0 var(--shadow);
    transition:transform .1s ease, box-shadow .1s ease;
  }
  .a11y-toggle:hover{border-color:var(--accent);}
  .a11y-toggle:active{transform:translate(2px,2px); box-shadow:none;}

  .a11y-panel{
    background:var(--card);
    border:2px solid var(--ink);
    border-radius:14px;
    padding:14px 16px;
    margin-bottom:18px;
    display:flex;
    flex-direction:column;
    gap:14px;
    box-shadow:3px 3px 0 var(--shadow);
  }
  .a11y-panel[hidden]{
    display:none;
  }
  .a11y-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
  }
  .a11y-row-wrap{
    flex-direction:column;
    align-items:flex-start;
  }
  .a11y-row-wrap .a11y-btn-group{
    flex-wrap:wrap;
  }
  .a11y-label{
    font-size:0.85rem;
    font-weight:700;
  }
  .a11y-btn-group{
    display:flex;
    gap:6px;
  }
  .a11y-btn{
    background:var(--paper);
    border:2px solid var(--ink);
    border-radius:8px;
    padding:6px 10px;
    font-family:var(--font-body);
    font-size:0.8rem;
    font-weight:600;
    cursor:pointer;
    color:var(--ink);
  }
  .a11y-btn[aria-pressed="true"]{
    background:var(--accent);
    border-color:var(--ink);
    color:var(--accent-text);
  }

  .switch{
    width:44px;
    height:26px;
    border-radius:999px;
    border:2px solid var(--ink);
    background:var(--paper);
    position:relative;
    cursor:pointer;
    flex-shrink:0;
  }
  .switch::after{
    content:'';
    position:absolute;
    top:1px; left:1px;
    width:20px; height:20px;
    border-radius:50%;
    background:var(--ink-soft);
    transition:transform .15s ease, background .15s ease;
  }
  .switch[aria-checked="true"]{background:var(--accent);}
  .switch[aria-checked="true"]::after{
    transform:translateX(18px);
    background:#fff;
  }

  .color-row{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
  }
  #accentPicker{
    width:38px;
    height:38px;
    border:2px solid var(--ink);
    border-radius:8px;
    padding:0;
    cursor:pointer;
    background:none;
  }
  .swatch-group{
    display:flex;
    gap:6px;
    flex-wrap:wrap;
  }
  .swatch{
    width:28px;
    height:28px;
    border-radius:50%;
    border:2px solid var(--ink);
    cursor:pointer;
    padding:0;
  }
  .swatch-reset{
    background:var(--paper);
    color:var(--ink);
    font-size:0.9rem;
    line-height:1;
  }
  .contrast-note{
    font-size:0.74rem;
    color:var(--ink-soft);
    display:block;
  }
  .contrast-note.warn{
    color:var(--flag);
    font-weight:600;
  }
</style>
</head>
<body>
<a href="#main" class="skip-link">Saltar al contenido principal</a>
<div class="wrap">
  <header>
    <h1>Lector de Documentos</h1>
    <div class="header-right">
      <span class="tag" id="headerTag">Lab · Rx</span>
      <button id="a11yToggle" class="a11y-toggle" aria-expanded="false" aria-controls="a11yPanel" aria-label="Abrir opciones de accesibilidad">Aa ⚙</button>
    </div>
  </header>

  <div id="a11yPanel" class="a11y-panel" hidden>
    <div class="a11y-row">
      <span class="a11y-label" id="fontSizeLabel">Tamaño de texto</span>
      <div class="a11y-btn-group" role="group" aria-labelledby="fontSizeLabel">
        <button type="button" class="a11y-btn" data-scale="1" aria-pressed="true">A</button>
        <button type="button" class="a11y-btn" data-scale="1.15" aria-pressed="false">A+</button>
        <button type="button" class="a11y-btn" data-scale="1.3" aria-pressed="false">A++</button>
      </div>
    </div>
    <div class="a11y-row a11y-row-wrap">
      <span class="a11y-label" id="themeLabel">Tema de color</span>
      <div class="a11y-btn-group" role="group" aria-labelledby="themeLabel">
        <button type="button" class="a11y-btn" data-theme="light" aria-pressed="true">Claro</button>
        <button type="button" class="a11y-btn" data-theme="dark" aria-pressed="false">Oscuro</button>
        <button type="button" class="a11y-btn" data-theme="sepia" aria-pressed="false">Sepia</button>
        <button type="button" class="a11y-btn" data-theme="contrast" aria-pressed="false">Alto contraste</button>
      </div>
    </div>
    <div class="a11y-row a11y-row-wrap">
      <span class="a11y-label" id="colorLabel">Color de acento</span>
      <div class="color-row">
        <input type="color" id="accentPicker" aria-labelledby="colorLabel" value="#FF6B4A">
        <div class="swatch-group" role="group" aria-label="Colores de acento sugeridos, ya probados por contraste">
          <button type="button" class="swatch" data-color="#FF6B4A" style="background:#FF6B4A" aria-label="Coral"></button>
          <button type="button" class="swatch" data-color="#2C6E8E" style="background:#2C6E8E" aria-label="Azul"></button>
          <button type="button" class="swatch" data-color="#6B4EA0" style="background:#6B4EA0" aria-label="Morado"></button>
          <button type="button" class="swatch" data-color="#3F7D45" style="background:#3F7D45" aria-label="Verde"></button>
          <button type="button" class="swatch" data-color="#B0503B" style="background:#B0503B" aria-label="Terracota"></button>
          <button type="button" id="resetAccent" class="swatch swatch-reset" aria-label="Restablecer color por defecto">↺</button>
        </div>
      </div>
      <span id="contrastNote" class="contrast-note" aria-live="polite"></span>
    </div>
    <div class="a11y-row">
      <span class="a11y-label" id="dyslexiaLabel">Fuente de lectura fácil</span>
      <button type="button" id="dyslexiaSwitch" class="switch" role="switch" aria-checked="false" aria-labelledby="dyslexiaLabel"></button>
    </div>
  </div>

  <main id="main">

  <button id="installBtn" class="install-btn" style="display:none;">⬇ Instalar app</button>

  <div id="uploadZone" class="upload-zone" role="button" tabindex="0" aria-label="Subir documento, PDF o foto">
    <label for="fileInput" class="visually-hidden">Subir documento (PDF o foto)</label>
    <input type="file" id="fileInput" accept=".pdf,.jpg,.jpeg,.png,.webp">
    <span class="upload-icon" aria-hidden="true">⌁</span>
    <div class="upload-label">Sube tu documento (PDF o foto)</div>
    <div class="upload-hint">Toca aquí o arrastra el archivo</div>
  </div>
  <div id="fileChipHolder" aria-live="polite"></div>
  <div id="detectStatus" class="detect-status" aria-live="polite"></div>

  <div class="section-label" id="categoryLabel">Tipo de documento</div>
  <div class="modes" id="categoryToggle" role="group" aria-labelledby="categoryLabel">
    <button class="mode-btn active" data-cat="medico" aria-pressed="true">
      <span class="mode-icon" aria-hidden="true">🩺</span>
      <span class="mode-title">Análisis médico</span>
      <span class="mode-desc">Ej: análisis de sangre, laboratorio</span>
    </button>
    <button class="mode-btn" data-cat="judicial" aria-pressed="false">
      <span class="mode-icon" aria-hidden="true">⚖️</span>
      <span class="mode-title">Documento legal</span>
      <span class="mode-desc">Ej: demanda, sentencia, expediente</span>
    </button>
    <button class="mode-btn" data-cat="apuntes" aria-pressed="false">
      <span class="mode-icon" aria-hidden="true">📝</span>
      <span class="mode-title">Apuntes</span>
      <span class="mode-desc">Ej: notas de clase, resúmenes</span>
    </button>
  </div>

  <div class="section-label" id="levelLabel">Nivel de explicación</div>
  <div class="modes level-toggle" id="levelToggle" role="group" aria-labelledby="levelLabel">

function hexToRgb(hex){
  const n = parseInt(hex.replace('#',''), 16);
  return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
}
function relLuminance({r, g, b}){
  const [R, G, B] = [r, g, b].map(v => {
    v /= 255;
    return v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
  });
  return 0.2126 * R + 0.7152 * G + 0.0722 * B;
}
function contrastRatio(hex1, hex2){
  const L1 = relLuminance(hexToRgb(hex1));
  const L2 = relLuminance(hexToRgb(hex2));
  const [light, dark] = L1 > L2 ? [L1, L2] : [L2, L1];
  return (light + 0.05) / (dark + 0.05);
}

function applyAccentColor(hex){
  const whiteContrast = contrastRatio(hex, '#FFFFFF');
  const blackContrast = contrastRatio(hex, '#000000');
  const textColor = whiteContrast >= blackContrast ? '#FFFFFF' : '#000000';
  const bestContrast = Math.max(whiteContrast, blackContrast);

  document.body.style.setProperty('--accent', hex);
  document.body.style.setProperty('--accent-text', textColor);
  document.body.style.setProperty('--shadow', hex);

  if (bestContrast < 4.5) {
    contrastNote.textContent = `⚠ Este color tiene contraste bajo (${bestContrast.toFixed(1)}:1). Se recomienda al menos 4.5:1 para texto legible.`;
    contrastNote.classList.add('warn');
  } else {
    contrastNote.textContent = `Contraste de texto: ${bestContrast.toFixed(1)}:1 — cumple el estándar de accesibilidad.`;
    contrastNote.classList.remove('warn');
  }
  accentPicker.value = hex;
}

async function detectCategory(){
  if (!currentFile) return;
  const detectStatus = document.getElementById('detectStatus');
  detectStatus.innerHTML = '<span class="spinner" aria-hidden="true"></span> Detectando tipo de documento…';
  detectStatus.classList.remove('found');

  const classifyPrompt = 'Mira este documento y responde ÚNICAMENTE con una de estas tres palabras exactas, sin nada más: "medico" si es un análisis médico o de laboratorio; "judicial" si es un documento legal (demanda, sentencia, expediente, contrato, notificación); "apuntes" si son notas de clase, resúmenes de estudio o material educativo. Si no estás seguro, elige la opción más probable. Responde solo con la palabra, sin puntuación ni explicación.';

      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{
          parts: [

            { text: classifyPrompt }
          ]
        }]
      })
    });

      detectStatus.textContent = 'No pudimos detectar el tipo automáticamente — elige uno arriba.';

    detectStatus.textContent = 'No pudimos detectar el tipo automáticamente — elige uno arriba.';
  }
}

    const base64 = reader.result.split(',')[1];
    const ext = file.name.split('.').pop().toLowerCase();
    let mediaType = 'application/pdf';
    if (['jpg','jpeg'].includes(ext)) mediaType = 'image/jpeg';
    else if (ext === 'png') mediaType = 'image/png';
    else if (ext === 'webp') mediaType = 'image/webp';

    currentFile = { base64, mediaType, name: file.name };
    renderChip();
    runBtn.disabled = false;
    runBtn.textContent = 'Analizar documento';
    detectCategory();
  };
  reader.onerror = () => {
    fileChipHolder.innerHTML = `<div class="error-box">No se pudo leer el archivo. Intenta de nuevo.</div>`;
  };
  reader.readAsDataURL(file);
}

    const data = await response.json();
    const text = (data.candidates?.[0]?.content?.parts || []).map(p => p.text || '').join('\n').trim();

    if (!text) throw new Error('No se pudo generar una respuesta.');

    renderResult(text);
  } catch (err) {
    resultHolder.innerHTML = `<div class="error-box">Ocurrió un problema al analizar el documento. ${err.message || ''} Intenta de nuevo.</div>`;
  } finally {
    runBtn.disabled = false;
    runBtn.textContent = originalText;
  }
});

function escapeHtml(str){
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderResult(text){
  const lines = text.split('\n').map(line => {
    let escaped = escapeHtml(line);
    escaped = escaped.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    if (escaped.trim().startsWith('⚑')) {
      return `<div class="flag-line">${escaped}</div>`;
    }
    return escaped;
  }).join('\n');

  resultHolder.innerHTML = `
    <div class="result">
      <div class="result-head"><span>${modeLabels[currentCategory][currentMode]}</span></div>
      <div class="result-body">
        <div class="margin-rule"></div>
        <div class="result-text">${lines}</div>
      </div>
    </div>
    <div class="disclaimer">${disclaimers[currentCategory]}</div>
  `;
}
</script>
</body>
</html>
